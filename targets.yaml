# Public bot-detection test pages.
# Each target: url, name, optional `extract` map of selectors to scrape,
# optional `wait_until`, `timeout_ms`, `settle_s`.
targets:
  - name: sannysoft
    url: https://bot.sannysoft.com/
    settle_s: 4
    # Sannysoft renders a results table; "passed" rows have green bg.
    # We just save the screenshot for human eval; no clean numeric score.

  - name: creepjs
    url: https://abrahamjuliot.github.io/creepjs/
    settle_s: 8
    timeout_ms: 90000
    extract:
      trust_score: ".trust-score-container .unblurred"
      fp_id: ".fingerprint-section .unblurred"

  - name: browserleaks
    url: https://browserleaks.com/javascript
    settle_s: 4

  - name: browserscan-bot
    url: https://www.browserscan.net/bot-detection
    settle_s: 8
    timeout_ms: 90000
    extract:
      verdict: "h1, h2"  # composite verdict near top

  - name: pixelscan-bot
    url: https://pixelscan.net/bot-check
    settle_s: 8
    timeout_ms: 90000

  - name: pixelscan-fp
    url: https://pixelscan.net/fingerprint-check
    settle_s: 8
    timeout_ms: 90000

  # ----- TLS fingerprint endpoints (leftcurvedev_'s filter) -----
  # These return JSON; screenshot is unimportant, page.content() captures the body.

  - name: tls-peet
    url: https://tls.peet.ws/api/all
    settle_s: 2
    timeout_ms: 30000

  - name: browserleaks-tls
    url: https://tls.browserleaks.com/json
    settle_s: 2
    timeout_ms: 30000

  # ----- Real-world / purpose-built hostile targets -----

  - name: bot-incolumitas
    url: https://bot.incolumitas.com/
    settle_s: 10
    timeout_ms: 90000
    extract:
      bot_score: "#bot-score, .bot-score, [class*='botScore'], [id*='score']"

  - name: rebrowser-detector
    url: https://bot-detector.rebrowser.net/
    settle_s: 10
    timeout_ms: 90000

  - name: nowsecure-cf
    url: https://nowsecure.nl/
    settle_s: 12
    timeout_ms: 90000

  - name: crunchbase-cf
    url: https://www.crunchbase.com/
    settle_s: 8
    timeout_ms: 60000

  # ----- Ian's real-world targets (promo-monitor + canadian-smallcap-trading) -----

  - name: canadianinsider
    url: https://www.canadianinsider.com/
    settle_s: 6
    timeout_ms: 60000

  - name: sedarplus
    url: https://www.sedarplus.ca/landingpage/
    settle_s: 8
    timeout_ms: 90000

  - name: ceo-ca
    url: https://ceo.ca/scan
    settle_s: 6
    timeout_ms: 60000

  - name: stockwatch
    url: https://www.stockwatch.com/News/Search?hours=24&region=C
    settle_s: 6
    timeout_ms: 60000

  - name: newsfilecorp
    url: https://www.newsfilecorp.com/search?q=gold
    settle_s: 6
    timeout_ms: 60000

  # ----- "Fair test for Camoufox" — standard-config Cloudflare sites -----
  # canadianinsider.com keys on JA4 cipher list and flags Camoufox's stale
  # cipher (0xC009 still present, removed in real Firefox 150). These four
  # are the broad middle: Cloudflare-protected, high-volume, but not
  # JA4-strict. Camoufox passes all of them with default config + locale.

  - name: medium
    url: https://medium.com/
    settle_s: 8
    timeout_ms: 60000

  - name: devto
    url: https://dev.to/
    settle_s: 8
    timeout_ms: 60000

  - name: reddit
    url: https://www.reddit.com/
    settle_s: 10
    timeout_ms: 90000

  - name: github-explore
    url: https://github.com/explore
    settle_s: 8
    timeout_ms: 60000

  # ----- "How to scrape X" demo targets (SEO-identified high-search-interest) -----
  # These are the sites readers Google "how to scrape X" for. Bench them so the
  # post can speak to which browser passes which. Hostile-protection variety:
  # Akamai (linkedin, booking), Turnstile (google, x), behavioral (amazon, tiktok),
  # Camoufox-publicly-cited (instagram).
  # Conservative timeouts + domcontentloaded — these targets are aggressive and
  # 'load' may never fire if a CF beacon streams.

  - name: linkedin-jobs
    url: https://www.linkedin.com/jobs/search?keywords=engineer
    settle_s: 8
    timeout_ms: 45000
    wait_until: domcontentloaded

  - name: amazon-product
    url: https://www.amazon.com/dp/B08N5WRWNW
    settle_s: 8
    timeout_ms: 45000
    wait_until: domcontentloaded

  - name: google-search
    url: https://www.google.com/search?q=anti-detect+browser
    settle_s: 8
    timeout_ms: 45000
    wait_until: domcontentloaded

  - name: instagram-post
    url: https://www.instagram.com/p/CwgPe2erjLY/
    settle_s: 8
    timeout_ms: 45000
    wait_until: domcontentloaded

  - name: tiktok-user
    url: https://www.tiktok.com/@tiktok
    settle_s: 8
    timeout_ms: 45000
    wait_until: domcontentloaded

  - name: booking-search
    url: https://www.booking.com/searchresults.html?ss=Victoria%2C+BC
    settle_s: 10
    timeout_ms: 60000
    wait_until: domcontentloaded

  - name: x-explore
    url: https://x.com/explore
    settle_s: 10
    timeout_ms: 60000
    wait_until: domcontentloaded
